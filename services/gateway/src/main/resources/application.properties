spring.application.name=gateway

server.port=8080

# =========================
# REDIS RATE LIMITER
# =========================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

# =========================
# DONACIONES
# =========================

spring.cloud.gateway.server.webflux.routes[0].id=donaciones
spring.cloud.gateway.server.webflux.routes[0].uri=${DONACIONES_URI:http://localhost:8081}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/donaciones/**
spring.cloud.gateway.server.webflux.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[0].filters[0].args.name=donacionesCB
spring.cloud.gateway.server.webflux.routes[0].filters[0].args.fallbackUri=forward:/fallback/donaciones
spring.cloud.gateway.server.webflux.routes[0].filters[1].name=RequestRateLimiter
spring.cloud.gateway.server.webflux.routes[0].filters[1].args.redis-rate-limiter.replenishRate=10
spring.cloud.gateway.server.webflux.routes[0].filters[1].args.redis-rate-limiter.burstCapacity=20
spring.cloud.gateway.server.webflux.routes[0].filters[1].args.key-resolver=#{@ipKeyResolver}

