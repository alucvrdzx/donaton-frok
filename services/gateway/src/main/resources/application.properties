spring.application.name=gateway

server.port=8080

# =========================
# DONACIONES
# =========================

spring.cloud.gateway.server.webflux.routes[0].id=donaciones
spring.cloud.gateway.server.webflux.routes[0].uri=${DONACIONES_URI:http://localhost:8081}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/donaciones/**


spring.cloud.gateway.server.webflux.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[0].filters[0].args.name=donacionesCircuit
spring.cloud.gateway.server.webflux.routes[0].filters[0].args.fallbackUri=forward:/fallback/donaciones


