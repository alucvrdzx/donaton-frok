spring.application.name=necesidades

server.port=8085

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Actuator - exponer endpoints de health y circuit breakers
management.endpoints.web.exposure.include=health,info,circuitbreakers
management.endpoint.health.show-details=always

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.rabbitMQPub.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.rabbitMQPub.sliding-window-size=10
resilience4j.circuitbreaker.instances.rabbitMQPub.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.rabbitMQPub.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.rabbitMQPub.wait-duration-in-open-state=10000ms
resilience4j.circuitbreaker.instances.rabbitMQPub.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.rabbitMQPub.automatic-transition-from-open-to-half-open-enabled=true
