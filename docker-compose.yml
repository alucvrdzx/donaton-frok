services:

  postgres_donaciones:
    image: postgres:16
    container_name: postgres_donaciones
    environment:
      POSTGRES_DB: donaciones
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
    ports:
      - "5432:5432"
    networks:
      - microservicios-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_inventario:
    image: postgres:16
    container_name: postgres_inventario
    environment:
      POSTGRES_DB: inventario
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
    ports:
      - "5433:5432"
    networks:
      - microservicios-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_logistica:
    image: postgres:16
    container_name: postgres_logistica
    environment:
      POSTGRES_DB: logistica
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
    ports:
      - "5434:5432"
    networks:
      - microservicios-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_necesidades:
    image: postgres:16
    container_name: postgres_necesidades
    environment:
      POSTGRES_DB: necesidades
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
    ports:
      - "5436:5432"
    networks:
      - microservicios-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  donaciones:
    build: ./services/donaciones
    container_name: donaciones
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_donaciones:5432/donaciones
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-admin123}
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres_donaciones:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    networks:
      - microservicios-net

  inventario:
    build: ./services/inventario
    container_name: inventario
    ports:
      - "8086:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_inventario:5432/inventario
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-admin123}
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres_inventario:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    networks:
      - microservicios-net

  logistica:
    build: ./services/logistica
    container_name: logistica
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_logistica:5432/logistica
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-admin123}
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres_logistica:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    networks:
      - microservicios-net

  necesidades:
    build: ./services/necesidades
    container_name: necesidades
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_necesidades:5432/necesidades
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-admin123}
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres_necesidades:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    networks:
      - microservicios-net

  gateway:
    build: ./services/gateway
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      - DONACIONES_URI=http://donaciones:8081
      - INVENTARIO_URI=http://inventario:8082
      - LOGISTICA_URI=http://logistica:8083
      - AUTH_URI=http://auth-service:8084
      - NECESIDADES_URI=http://necesidades:8085
    networks:
      - microservicios-net
    depends_on:
      - donaciones
      - inventario
      - logistica
      - auth-service
      - necesidades
    restart: on-failure

  postgres_auth:
    image: postgres:15-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_DB: humanitarian_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_AUTH_PASSWORD:-1234}
    ports:
      - "5435:5432"
    networks:
      - microservicios-net
    volumes:
      - db_data_auth:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./services/authservice
    container_name: auth-service-container
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_auth:5432/humanitarian_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_AUTH_PASSWORD:-1234}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-esta_es_una_clave_secreta_muy_larga_y_segura_dev_only_123456}
    depends_on:
      postgres_auth:
        condition: service_healthy
    restart: on-failure
    networks:
      - microservicios-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - microservicios-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    networks:
      - microservicios-net

networks:
  microservicios-net:
    driver: bridge

volumes:
  db_data_auth:
